<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Brett Seton</title>
  <meta name="description" content="A small Rust WebAssembly app built around an interactive terminal UI.">
  <meta property="og:title" content="Brett Seton">
  <meta property="og:description" content="A small Rust WebAssembly app built around an interactive terminal UI.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://brettseton.com">
  <link rel="canonical" href="https://brettseton.com">
  <link data-trunk rel="copy-file" href="CNAME">
  <link data-trunk rel="copy-file" href="src/assets/favicon.svg">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link data-trunk rel="css" href="src/assets/style.css">
  <link data-trunk rel="rust" data-wasm-opt="0">
</head>
<body>
  <main class="page">
    <div class="shell-wrap">
      <section class="shell" id="terminal-shell">
        <div class="terminal">
          <div class="terminal-bar">
            <div class="traffic-lights" aria-hidden="true">
              <span class="light red"></span>
              <span class="light yellow"></span>
              <span class="light green"></span>
            </div>
            <span>brettseton.com</span>
          </div>

          <div class="terminal-body" id="terminal-history"></div>

          <form class="terminal-form" id="terminal-form">
            <span class="prompt">$</span>
            <input id="terminal-input" aria-label="Terminal input" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="ls">
          </form>

          <div class="app-controls" id="app-controls" aria-label="Game controls" hidden>
            <button class="joystick-base" id="control-stick" type="button" aria-label="Move snake">
              <span class="joystick-thumb" id="control-thumb" aria-hidden="true"></span>
            </button>
          </div>
        </div>
      </section>
    </div>

    <nav class="socials" aria-label="External links">
      <a id="social-github" href="https://github.com/brettseton" target="_blank" rel="noopener noreferrer" aria-label="GitHub">

      </a>
      <a id="social-linkedin" href="https://au.linkedin.com/in/brett-seton-b00776195" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">
        <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect width="4" height="12" x="2" y="9"/><circle cx="4" cy="4" r="2"/></svg>
      </a>
    </nav>
  </main>
</body>
</html>
